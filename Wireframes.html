<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wireframes — Pedro Almeida</title>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #f2f0eb; font-family: 'Caveat', cursive; }
</style>
</head>
<body>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel">

// ── Shared sketch primitives ──────────────────────────────────

const S = {
  bg: '#1a1a1a',
  mid: '#2d2d2d',
  line: '#444',
  text: '#ccc',
  accent: '#e8e0d0',
  red: '#c0392b',
  gray: '#888',
  white: '#f0ede8',
};

const f = (size, weight='400') => ({ fontFamily:'Caveat,cursive', fontSize: size, fontWeight: weight });

// Hatched placeholder box
function Hatch({ w, h, label, style={}, color='#555', bg='#222' }) {
  const id = `h${Math.random().toString(36).slice(2,7)}`;
  return (
    <div style={{ width: w, height: h, background: bg, position:'relative', overflow:'hidden', flexShrink:0, ...style }}>
      <svg width={w} height={h} style={{ position:'absolute', inset:0 }}>
        <defs>
          <pattern id={id} width="12" height="12" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
            <line x1="0" y1="0" x2="0" y2="12" stroke={color} strokeWidth="0.8" opacity="0.4"/>
          </pattern>
        </defs>
        <rect width={w} height={h} fill={`url(#${id})`}/>
        {label && <text x={w/2} y={h/2} textAnchor="middle" dominantBaseline="middle" fill="#888" fontSize="11" fontFamily="Caveat,cursive">{label}</text>}
      </svg>
    </div>
  );
}

function Box({ w, h, style, children }) {
  return <div style={{ width:w, height:h, border:'1.5px solid #444', ...style }}>{children}</div>;
}

function Label({ children, style }) {
  return <div style={{ ...f(13), color:'#888', letterSpacing:1, textTransform:'uppercase', ...style }}>{children}</div>;
}

function Dash({ w=80 }) {
  return <div style={{ width: w, height:2, background:'#555', borderRadius:1 }}/>;
}

function NavBar({ items=[], cta, light }) {
  const bg = light ? '#f0ede8' : '#111';
  const tc = light ? '#222' : S.white;
  const lc = light ? '#555' : '#888';
  return (
    <div style={{ background: bg, display:'flex', alignItems:'center', padding:'0 20px', height:44, gap:16, borderBottom:`1px solid ${light?'#ddd':'#333'}` }}>
      <div style={{ ...f(16,'700'), color: tc, marginRight:8 }}>PA</div>
      <div style={{ flex:1, display:'flex', gap:12 }}>
        {items.map(it => <div key={it} style={{ ...f(11), color:lc }}>{it}</div>)}
      </div>
      {cta && <div style={{ background:'#e8e0d0', color:'#111', padding:'3px 10px', ...f(10,'700'), borderRadius:2 }}>{cta}</div>}
    </div>
  );
}

// ── OPTION A — Full-bleed cinematic dark ─────────────────────
function OptionA() {
  return (
    <div style={{ width:620, background:S.bg, color:S.white }}>
      <NavBar items={['Trabalhos','Sobre','Contato']} cta="Contato"/>

      {/* HERO */}
      <div style={{ position:'relative', height:220 }}>
        <Hatch w={620} h={220} label="⬛ DEMOREEL VIDEO (autoplay, muted)" color="#333" bg="#111"/>
        <div style={{ position:'absolute', inset:0, background:'linear-gradient(to top, #1a1a1a 0%, transparent 60%)' }}/>
        <div style={{ position:'absolute', bottom:20, left:24 }}>
          <div style={{ ...f(28,'700'), lineHeight:1.1 }}>Filmmaker &</div>
          <div style={{ ...f(28,'700'), lineHeight:1.1, color:'#aaa' }}>Coord. de Criação</div>
          <div style={{ ...f(12), color:'#777', marginTop:6 }}>Pedro Almeida · São Paulo</div>
        </div>
        <div style={{ position:'absolute', bottom:20, right:24, border:'1px solid #555', padding:'4px 12px', ...f(11), color:'#aaa' }}>▶ Play Reel</div>
      </div>

      {/* WORKS label */}
      <div style={{ padding:'16px 24px 8px', display:'flex', justifyContent:'space-between', alignItems:'center' }}>
        <div style={{ ...f(18,'700') }}>Trabalhos</div>
        <div style={{ ...f(11), color:'#666' }}>ver todos →</div>
      </div>

      {/* GRID 3-col masonry-ish */}
      <div style={{ padding:'0 24px 16px', display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gap:6 }}>
        {[['Comercial · Nike', 120],['Doc · Periferia', 80],['Música · Ana Frango', 100],
          ['Curta · Sem Saída', 90],['Institucional · SESC', 70],['Branded · Havaianas', 110]].map(([lbl,h],i) => (
          <div key={i} style={{ position:'relative' }}>
            <Hatch w="100%" h={h} label={lbl} bg="#222" color="#444"/>
            <div style={{ position:'absolute', bottom:0, left:0, right:0, padding:'4px 6px', background:'linear-gradient(transparent,rgba(0,0,0,0.8))' }}>
              <div style={{ ...f(9), color:'#ccc' }}>{lbl}</div>
            </div>
          </div>
        ))}
      </div>

      {/* ABOUT strip */}
      <div style={{ display:'flex', gap:0, borderTop:'1px solid #2d2d2d' }}>
        <Hatch w={140} h={100} label="foto" bg="#1d1d1d" color="#333"/>
        <div style={{ flex:1, padding:'14px 16px' }}>
          <div style={{ ...f(14,'700'), marginBottom:4 }}>Sobre Pedro</div>
          <Dash w={120}/><div style={{ height:4 }}/><Dash w={90}/><div style={{ height:4 }}/><Dash w={100}/>
          <div style={{ ...f(10), color:'#555', marginTop:8 }}>→ LinkedIn · Instagram · Vimeo</div>
        </div>
      </div>

      {/* CONTACT */}
      <div style={{ padding:'14px 24px', borderTop:'1px solid #2d2d2d', display:'flex', gap:8, alignItems:'center' }}>
        <div style={{ flex:1 }}>
          <div style={{ ...f(14,'700'), marginBottom:4 }}>Contato</div>
          <Box w={160} h={22} style={{ padding:'0 6px', display:'flex', alignItems:'center' }}><div style={{ ...f(10), color:'#555' }}>email@...</div></Box>
        </div>
        <div style={{ background:'#e8e0d0', color:'#111', padding:'6px 14px', ...f(11,'700') }}>Enviar →</div>
      </div>

      <div style={{ padding:'8px 24px', ...f(10), color:'#444', borderTop:'1px solid #222' }}>© 2024 Pedro Almeida</div>
    </div>
  );
}

// ── OPTION B — Magazine editorial split ──────────────────────
function OptionB() {
  return (
    <div style={{ width:620, background:'#111', color:S.white }}>
      <NavBar items={['Reel','Cases','Sobre','Contato']}/>

      {/* HERO — big left text + right video */}
      <div style={{ display:'flex', height:200, borderBottom:'1px solid #222' }}>
        <div style={{ flex:'0 0 220px', padding:'20px 24px', display:'flex', flexDirection:'column', justifyContent:'space-between' }}>
          <div>
            <div style={{ ...f(32,'700'), lineHeight:1, letterSpacing:-1 }}>Pedro</div>
            <div style={{ ...f(32,'700'), lineHeight:1, letterSpacing:-1 }}>Almeida</div>
            <div style={{ ...f(10), color:'#666', marginTop:6, lineHeight:1.5 }}>Filmmaker · Coord. Criação</div>
          </div>
          <div style={{ ...f(10), color:'#555' }}>SP — Brasil</div>
        </div>
        <div style={{ flex:1, position:'relative' }}>
          <Hatch w="100%" h={200} label="DEMOREEL" bg="#0d0d0d" color="#333"/>
          <div style={{ position:'absolute', top:'50%', left:'50%', transform:'translate(-50%,-50%)', width:36, height:36, borderRadius:'50%', border:'2px solid #aaa', display:'flex', alignItems:'center', justifyContent:'center' }}>
            <div style={{ ...f(14), marginLeft:2 }}>▶</div>
          </div>
        </div>
      </div>

      {/* WORKS — 2 wide + sidebar */}
      <div style={{ display:'flex', borderBottom:'1px solid #222' }}>
        <div style={{ flex:1 }}>
          <div style={{ padding:'10px 16px', ...f(10,'700'), color:'#666', borderBottom:'1px solid #1d1d1d' }}>TRABALHOS SELECIONADOS</div>
          <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:2 }}>
            {[['Nike · Comercial',100],['SESC · Doc',80],['Havaianas · Branded',90],['Ana Frango · Clipe',80]].map(([l,h],i)=>(
              <div key={i} style={{ position:'relative' }}>
                <Hatch w="100%" h={h} label={l} bg="#181818" color="#333"/>
                <div style={{ position:'absolute', bottom:4, left:6, ...f(9), color:'#aaa' }}>{l}</div>
              </div>
            ))}
          </div>
        </div>
        <div style={{ width:120, borderLeft:'1px solid #222', display:'flex', flexDirection:'column', gap:2, padding:8 }}>
          <div style={{ ...f(10,'700'), color:'#666', marginBottom:4 }}>CATEGORIAS</div>
          {['Comercial','Documentário','Clipe','Institucional','Branded Content'].map(c=>(
            <div key={c} style={{ ...f(11), color:'#777', paddingBottom:4, borderBottom:'1px solid #1d1d1d' }}>{c}</div>
          ))}
        </div>
      </div>

      {/* ABOUT + CONTACT row */}
      <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:0 }}>
        <div style={{ padding:'14px 16px', borderRight:'1px solid #222' }}>
          <div style={{ ...f(12,'700'), marginBottom:8 }}>SOBRE</div>
          <div style={{ display:'flex', gap:10 }}>
            <Hatch w={60} h={60} label="foto" bg="#1a1a1a" color="#444" style={{ borderRadius:'50%' }}/>
            <div>
              <Dash w={80}/><div style={{ height:5 }}/><Dash w={60}/><div style={{ height:5 }}/><Dash w={70}/>
            </div>
          </div>
        </div>
        <div style={{ padding:'14px 16px' }}>
          <div style={{ ...f(12,'700'), marginBottom:8 }}>CONTATO</div>
          <Box w="100%" h={22} style={{ marginBottom:6 }}><div style={{ padding:'2px 8px', ...f(10), color:'#555' }}>email</div></Box>
          <Box w="100%" h={22} style={{ marginBottom:8 }}><div style={{ padding:'2px 8px', ...f(10), color:'#555' }}>mensagem</div></Box>
          <div style={{ background:'#e8e0d0', color:'#111', textAlign:'center', padding:'4px', ...f(11,'700') }}>Enviar</div>
        </div>
      </div>
    </div>
  );
}

// ── OPTION C — Fullscreen scroll / immersive ─────────────────
function OptionC() {
  return (
    <div style={{ width:620, background:'#0d0d0d', color:S.white }}>
      {/* Floating nav */}
      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', padding:'12px 24px', borderBottom:'1px solid #1d1d1d' }}>
        <div style={{ ...f(14,'700') }}>Pedro Almeida</div>
        <div style={{ display:'flex', gap:16 }}>
          {['Trabalhos','Sobre','Contato'].map(i=><div key={i} style={{ ...f(11), color:'#777' }}>{i}</div>)}
        </div>
      </div>

      {/* HERO full bleed video */}
      <div style={{ position:'relative', height:250 }}>
        <Hatch w={620} h={250} label="DEMOREEL — full bleed, autoplay" bg="#080808" color="#2a2a2a"/>
        <div style={{ position:'absolute', inset:0, background:'linear-gradient(to bottom, transparent 40%, #0d0d0d 100%)' }}/>
        <div style={{ position:'absolute', bottom:24, left:'50%', transform:'translateX(-50%)', textAlign:'center' }}>
          <div style={{ ...f(11), color:'#666', letterSpacing:3, marginBottom:6 }}>FILMMAKER · COORD. CRIAÇÃO</div>
          <div style={{ ...f(34,'700'), lineHeight:1, letterSpacing:-1 }}>Pedro Almeida</div>
        </div>
      </div>

      {/* Scrolling marquee label */}
      <div style={{ padding:'8px 0', borderTop:'1px solid #1d1d1d', borderBottom:'1px solid #1d1d1d', overflow:'hidden' }}>
        <div style={{ ...f(10), color:'#444', letterSpacing:3, whiteSpace:'nowrap' }}>
          COMERCIAL · DOCUMENTÁRIO · BRANDED CONTENT · CLIPE MUSICAL · INSTITUCIONAL · FICÇÃO ·&nbsp;
          COMERCIAL · DOCUMENTÁRIO · BRANDED CONTENT · CLIPE MUSICAL ·
        </div>
      </div>

      {/* WORKS — masonry bento */}
      <div style={{ padding:'16px 20px 12px' }}>
        <div style={{ ...f(10,'700'), color:'#444', letterSpacing:2, marginBottom:10 }}>TRABALHOS</div>
        <div style={{ display:'grid', gridTemplateColumns:'2fr 1fr', gridTemplateRows:'auto auto', gap:4 }}>
          <Hatch w="100%" h={130} label="Destaque · Nike Brasil" bg="#151515" color="#333"/>
          <div style={{ display:'flex', flexDirection:'column', gap:4 }}>
            <Hatch w="100%" h={62} label="SESC" bg="#151515" color="#333"/>
            <Hatch w="100%" h={62} label="Havaianas" bg="#151515" color="#333"/>
          </div>
          <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:4 }}>
            <Hatch w="100%" h={80} label="Clipe" bg="#151515" color="#333"/>
            <Hatch w="100%" h={80} label="Doc" bg="#151515" color="#333"/>
          </div>
          <Hatch w="100%" h={80} label="Curta" bg="#151515" color="#333"/>
        </div>
      </div>

      {/* ABOUT */}
      <div style={{ margin:'0 20px', borderTop:'1px solid #1d1d1d', padding:'14px 0', display:'flex', gap:14, alignItems:'flex-start' }}>
        <Hatch w={70} h={90} label="foto" bg="#151515" color="#333" style={{ flexShrink:0 }}/>
        <div style={{ flex:1 }}>
          <div style={{ ...f(14,'700'), marginBottom:6 }}>Sobre</div>
          <Dash w={100}/><div style={{ height:5 }}/><Dash w={140}/><div style={{ height:5 }}/><Dash w={80}/>
          <div style={{ display:'flex', gap:8, marginTop:10 }}>
            {['IG','LI','VM'].map(s=><div key={s} style={{ border:'1px solid #333', padding:'2px 8px', ...f(10), color:'#666' }}>{s}</div>)}
          </div>
        </div>
      </div>

      {/* CONTACT */}
      <div style={{ margin:'0 20px 16px', borderTop:'1px solid #1d1d1d', padding:'14px 0' }}>
        <div style={{ ...f(14,'700'), marginBottom:10 }}>Contato</div>
        <div style={{ display:'flex', gap:8 }}>
          <Box w="100%" h={26} style={{ flex:1 }}><div style={{ padding:'2px 8px', ...f(10), color:'#555' }}>nome</div></Box>
          <Box w="100%" h={26} style={{ flex:1 }}><div style={{ padding:'2px 8px', ...f(10), color:'#555' }}>email</div></Box>
        </div>
        <Box w="100%" h={40} style={{ marginTop:4 }}><div style={{ padding:'4px 8px', ...f(10), color:'#555' }}>mensagem...</div></Box>
        <div style={{ background:'#e8e0d0', color:'#111', textAlign:'center', padding:'6px', ...f(12,'700'), marginTop:6 }}>Enviar mensagem →</div>
      </div>
    </div>
  );
}

// ── PROJECT DETAIL PAGE wireframe ────────────────────────────
function ProjectPage() {
  return (
    <div style={{ width:620, background:'#111', color:S.white }}>
      <NavBar items={['← Voltar','Trabalhos','Sobre']}/>

      {/* Video principal */}
      <div style={{ position:'relative' }}>
        <Hatch w={620} h={200} label="VIDEO DO PROJETO — player embed" bg="#0d0d0d" color="#2a2a2a"/>
        <div style={{ position:'absolute', top:'50%', left:'50%', transform:'translate(-50%,-50%)', width:44, height:44, borderRadius:'50%', border:'2px solid #aaa', display:'flex', alignItems:'center', justifyContent:'center' }}>
          <div style={{ ...f(16), marginLeft:3 }}>▶</div>
        </div>
      </div>

      {/* Texto do projeto */}
      <div style={{ padding:'16px 24px 12px', display:'flex', gap:24 }}>
        <div style={{ flex:1 }}>
          <div style={{ ...f(11), color:'#666', letterSpacing:2, marginBottom:4 }}>COMERCIAL · 2024</div>
          <div style={{ ...f(22,'700'), lineHeight:1.1, marginBottom:10 }}>Título do Projeto</div>
          <Dash w={180}/><div style={{ height:5 }}/><Dash w={220}/><div style={{ height:5 }}/><Dash w={160}/><div style={{ height:5 }}/><Dash w={200}/>
        </div>
        <div style={{ width:120, flexShrink:0 }}>
          <div style={{ ...f(10,'700'), color:'#555', letterSpacing:1, marginBottom:6 }}>FICHA</div>
          {['Direção','Produção','Cliente','Agência','Ano'].map(k=>(
            <div key={k} style={{ marginBottom:5 }}>
              <div style={{ ...f(9), color:'#555' }}>{k}</div>
              <Dash w={70}/>
            </div>
          ))}
        </div>
      </div>

      {/* Bastidores label */}
      <div style={{ padding:'8px 24px', borderTop:'1px solid #1d1d1d', display:'flex', justifyContent:'space-between' }}>
        <div style={{ ...f(11,'700'), color:'#666', letterSpacing:2 }}>BASTIDORES</div>
        <div style={{ ...f(10), color:'#555' }}>fotos + vídeo</div>
      </div>

      {/* Bastidores grid */}
      <div style={{ padding:'0 24px 16px', display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gap:4 }}>
        {[80,100,80,80,80,100].map((h,i)=>(
          <Hatch key={i} w="100%" h={h} label="bastidor" bg="#171717" color="#333"/>
        ))}
      </div>

      {/* Próximo projeto */}
      <div style={{ padding:'12px 24px', borderTop:'1px solid #1d1d1d', display:'flex', justifyContent:'space-between', alignItems:'center' }}>
        <div style={{ ...f(10), color:'#555' }}>Próximo projeto</div>
        <div style={{ display:'flex', gap:8, alignItems:'center' }}>
          <Hatch w={60} h={36} label="" bg="#1a1a1a" color="#333"/>
          <div>
            <div style={{ ...f(11,'700') }}>Próximo Título</div>
            <div style={{ ...f(9), color:'#666' }}>Categoria</div>
          </div>
          <div style={{ ...f(14), color:'#666' }}>→</div>
        </div>
      </div>
    </div>
  );
}

// ── RENDER ───────────────────────────────────────────────────
function App() {
  return (
    <DesignCanvas>
      <DCSection id="homepage" title="Homepage — 3 Direções" subtitle="Estrutura e layout da página principal">
        <DCArtboard id="a" label="A · Cinematográfico Escuro" width={620} height={700}>
          <OptionA/>
        </DCArtboard>
        <DCArtboard id="b" label="B · Editorial Magazine" width={620} height={680}>
          <OptionB/>
        </DCArtboard>
        <DCArtboard id="c" label="C · Imersivo Full-Bleed" width={620} height={740}>
          <OptionC/>
        </DCArtboard>
      </DCSection>

      <DCSection id="detail" title="Página de Projeto" subtitle="Template ao clicar em um trabalho">
        <DCArtboard id="proj" label="Detalhe do Projeto" width={620} height={580}>
          <ProjectPage/>
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
<div id="root"></div>
</body>
</html>
